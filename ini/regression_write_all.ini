# regression_write_all.ini — override file for regression testing
# Pass AFTER the main .ini: ./class pgo_foo.ini regression_write_all.ini
#
# Enables writing of all intermediate tables to .dat files.
# The 'root' is set dynamically per run via a third .ini argument
# (e.g. root = baseline/<name>) so outputs land directly in the
# target directory without manual copying.

write_background = yes
write_thermodynamics = yes
write_primordial = yes
write_exotic_injection = yes
write_noninjection = yes
write_distortions = yes
write_parameters = no
overwrite_root = yes

# Perturbation tables at 3 representative k values (1/Mpc):
# sub-horizon, near-horizon, super-horizon
k_output_values = 0.0001, 0.01, 0.1
