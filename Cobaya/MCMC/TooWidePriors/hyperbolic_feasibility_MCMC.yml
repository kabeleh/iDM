    extra_args:
      gauge: newtonian
      N_ncdm: 1
      N_ur: 2.046
      sBBN file: sBBN_2017.dat
      # REMOVED: "non linear: halofit" — not needed, saves time
      model_cdm: i
      tol_initial_Omega_r: 0.1
      scf_tuning_index: 0
      scf_potential: hyperbolic
      attractor_ic_scf: no
    path: /home/users/u103677/iDM/

